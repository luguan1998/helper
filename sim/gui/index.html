<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>welink-cli 模拟器 · 聊天测试</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f0f2f5; }
    #wrap { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; height: 100vh; }
    #header { background: #4a90d9; color: #fff; padding: 10px 14px; font-size: 14px; }
    #header b { font-size: 16px; }
    #chat { flex: 1; overflow-y: auto; padding: 14px; }
    .msg { margin: 8px 0; max-width: 78%; padding: 8px 12px; border-radius: 10px; word-break: break-word; }
    .msg.user { background: #fff; margin-right: auto; }
    .msg.bot { background: #d4f5c9; margin-left: auto; text-align: left; }
    .msg .sender { font-size: 11px; color: #888; margin-bottom: 4px; }
    .msg.bot .sender { color: #4a7a3a; }
    .msg img { max-width: 100%; border-radius: 6px; display: block; margin: 4px 0; }
    .msg a { color: #4a90d9; text-decoration: none; }
    #bar { background: #fff; border-top: 1px solid #ddd; padding: 8px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    #bar input[type=text] { flex: 1; min-width: 120px; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    #bar #sender { max-width: 110px; }
    #bar button { padding: 8px 14px; border: none; background: #4a90d9; color: #fff; border-radius: 6px; cursor: pointer; font-size: 14px; }
    #bar label { font-size: 13px; color: #555; display: flex; align-items: center; gap: 4px; }
    .hint { font-size: 11px; color: #999; padding: 0 14px 6px; }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="header">
      <b>welink-cli 模拟器</b><br>
      <span id="groupInfo">加载中…</span>
    </div>
    <div id="chat"></div>
    <div class="hint">提示:接入真实 bot(sim:bot)前先关闭 echo,避免双重回复。</div>
    <div id="bar">
      <input id="sender" type="text" placeholder="发送者" value="user01">
      <input id="text" type="text" placeholder="输入消息后回车发送…">
      <button id="sendBtn">发送</button>
      <input id="upload" type="file" title="上传图片/文件">
      <label><input id="echo" type="checkbox"> echo 自动回复</label>
    </div>
  </div>
  <script>
    let lastSeenMsgId = 0
    let botAccount = 'bot01'

    const chat = document.getElementById('chat')
    const senderEl = document.getElementById('sender')
    const textEl = document.getElementById('text')

    function renderMsg(m) {
      const isBot = m.sender === botAccount
      const div = document.createElement('div')
      div.className = 'msg ' + (isBot ? 'bot' : 'user')
      const head = document.createElement('div')
      head.className = 'sender'
      head.textContent = m.sender
      div.appendChild(head)
      if (m.kind === 'image' && m.imageUrl) {
        const img = document.createElement('img')
        img.src = m.imageUrl
        div.appendChild(img)
        if (m.caption) { const c = document.createElement('div'); c.textContent = m.caption; div.appendChild(c) }
      } else if (m.kind === 'file' && m.fileUrl) {
        const a = document.createElement('a')
        a.href = m.fileUrl
        a.download = m.fileName || ''
        a.textContent = '📎 ' + (m.fileName || '文件')
        div.appendChild(a)
        if (m.caption) { const c = document.createElement('div'); c.textContent = m.caption; div.appendChild(c) }
      } else if (m.kind === 'card') {
        const c = document.createElement('div')
        c.textContent = '[卡片] ' + (m.caption || '')
        div.appendChild(c)
      } else {
        const c = document.createElement('div')
        c.textContent = m.caption ?? m.content ?? ''
        c.style.whiteSpace = 'pre-wrap'
        div.appendChild(c)
      }
      chat.appendChild(div)
      chat.scrollTop = chat.scrollHeight
    }

    async function poll() {
      try {
        const res = await fetch(`/api/messages?sinceId=${lastSeenMsgId}`)
        const data = await res.json()
        for (const m of data.messages || []) {
          renderMsg(m)
          if (m.msgId > lastSeenMsgId) lastSeenMsgId = m.msgId
        }
      } catch { /* ignore transient */ }
    }

    async function send() {
      const text = textEl.value
      if (!text) return
      textEl.value = ''
      await fetch('/api/send', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sender: senderEl.value || 'user01', text }),
      })
      poll()
    }

    document.getElementById('sendBtn').onclick = send
    textEl.addEventListener('keydown', e => { if (e.key === 'Enter') send() })

    document.getElementById('upload').onchange = async (e) => {
      const file = e.target.files[0]
      if (!file) return
      const reader = new FileReader()
      reader.onload = async (ev) => {
        const data = String(ev.target.result).split(',')[1]
        const kind = file.type.startsWith('image/') ? 'image' : 'file'
        await fetch('/api/upload', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sender: senderEl.value || 'user01', name: file.name, data, kind }),
        })
        e.target.value = ''
        poll()
      }
      reader.readAsDataURL(file)
    }

    document.getElementById('echo').onchange = async (e) => {
      await fetch('/api/config', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ echo: e.target.checked }),
      })
    }

    fetch('/api/config').then(r => r.json()).then(c => {
      botAccount = c.botAccount
      document.getElementById('echo').checked = !!c.echo
      document.getElementById('groupInfo').textContent = `群 ${c.groupId} · bot=${c.botAccount}`
    })
    setInterval(poll, 1000)
    poll()
  </script>
</body>
</html>
